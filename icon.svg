<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Trackr Mobile app icon. Full-bleed: iOS applies its own corner mask. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#101b3f"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.28" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#sheen)"/>

  <!-- target rings -->
  <circle cx="512" cy="512" r="336" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="58"/>
  <circle cx="512" cy="512" r="196" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="52"/>

  <!-- checkmark: on target, done -->
  <path d="M 340 540 L 470 672 L 718 392"
        fill="none" stroke="#0c1633" stroke-opacity="0.35" stroke-width="118"
        stroke-linecap="round" stroke-linejoin="round" transform="translate(0,14)"/>
  <path d="M 340 540 L 470 672 L 718 392"
        fill="none" stroke="#ffffff" stroke-width="96"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
